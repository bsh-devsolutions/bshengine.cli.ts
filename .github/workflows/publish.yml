name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test
      
      - name: Extract version and npm tag from tag
        id: tag_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Extract version and optional SemVer prerelease (v<version>[-<prerelease>])
          # Examples:
          #   v1.2.3           -> version=1.2.3, npm_tag=latest
          #   v1.2.3-beta.1    -> version=1.2.3-beta.1, npm_tag=beta
          #   v1.2.3-rc.2      -> version=1.2.3-rc.2, npm_tag=rc
          if [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            PRERELEASE="${BASH_REMATCH[3]}"
          else
            echo "Tag format invalid: $TAG_NAME"
            exit 1
          fi

          if [[ -z "$PRERELEASE" ]]; then
            NPM_TAG="latest"
          else
            # Use the first prerelease identifier as npm dist-tag (e.g. beta from beta.1)
            NPM_TAG="${PRERELEASE%%.*}"
          fi

          if [ "$NPM_TAG" = "latest" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "version=$VERSION"
            echo "npm_tag=latest"
          else
            echo "version=$VERSION-$PRERELEASE" >> $GITHUB_OUTPUT
            echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
            echo "version=$VERSION-$PRERELEASE"
            echo "npm_tag=$NPM_TAG"
          fi
        
      - name: Update package.json version
        run: |
          VERSION=${{ steps.tag_version.outputs.version }}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          echo "Current version: $CURRENT_VERSION"
          echo "Target version: $VERSION"
          
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "Updating package.json version to: $VERSION"
            npm version $VERSION --no-git-tag-version
          else
            echo "Version already set to $VERSION, skipping update"
          fi
          
      - name: Verify package.json version
        run: |
          ACTUAL_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_VERSION=${{ steps.tag_version.outputs.version }}
          echo "Package version: $ACTUAL_VERSION (expected: $EXPECTED_VERSION)"
          if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Error: Version mismatch!"
            exit 1
          fi
      
      - name: Publish to npm
        run: |
          VERSION=${{ steps.tag_version.outputs.version }}
          NPM_TAG=${{ steps.tag_version.outputs.npm_tag }}
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "========================================="
          echo "Publishing to npm:"
          echo "  Package: $PACKAGE_NAME"
          echo "  Version: $VERSION"
          echo "      Tag: $NPM_TAG"
          echo "========================================="
          npm publish --tag $NPM_TAG --access public
          echo "Successfully published $PACKAGE_NAME@$VERSION with tag: $NPM_TAG"
